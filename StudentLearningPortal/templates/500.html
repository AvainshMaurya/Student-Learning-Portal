{% extends "base.html" %}

{% block title %}Server Error - Student Learning Portal{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-5x text-danger"></i>
            </div>
            <h2 class="mb-3">500 - Server Error</h2>
            <p class="text-muted mb-4">
                Oops! Something went wrong on our end. Our team has been notified and is working to fix this issue.
            </p>
            <a href="/" class="btn btn-primary btn-lg">
                <i class="fas fa-home me-2"></i>Go Back Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
